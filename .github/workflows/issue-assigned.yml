name: Issue Assignment Notification

on:
  issues:
    types: [assigned, unassigned]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        uses: Ilshidur/action-discord@master
        with:
          args: |
            ${{ github.event.action == 'assigned' && '📌 Nouvelle tâche assignée !' || '🚫 Assignation annulée !' }}
            
            🧑‍💻 Utilisateur: ${{ github.event.assignee.login }}
            👤 Action par: ${{ github.actor }}
            📝 Issue: ${{ github.event.issue.title }}
            🔗 Lien: ${{ github.event.issue.html_url }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_ISSUE }}